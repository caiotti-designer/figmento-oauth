<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figmento — ChatGPT Authorization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e4e4e7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    .subtitle { color: #a1a1aa; margin-bottom: 32px; }
    .code-box {
      background: #09090b;
      border: 1px solid #3f3f46;
      border-radius: 8px;
      padding: 16px;
      margin: 24px 0;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      word-break: break-all;
      color: #a3e635;
      max-height: 120px;
      overflow-y: auto;
      user-select: all;
    }
    .btn {
      display: inline-block;
      background: #a3e635;
      color: #09090b;
      border: none;
      border-radius: 8px;
      padding: 12px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #bef264; }
    .btn.copied { background: #22c55e; }
    .status { margin-top: 16px; color: #a1a1aa; font-size: 13px; }
    .error { color: #ef4444; }
    .steps {
      text-align: left;
      margin-top: 24px;
      padding: 16px;
      background: #09090b;
      border-radius: 8px;
      font-size: 13px;
      color: #a1a1aa;
    }
    .steps li { margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Figmento</h1>
    <p class="subtitle">ChatGPT Authorization</p>

    <div id="loading">Exchanging authorization code...</div>

    <div id="success" style="display:none;">
      <p>Copy the activation code below and paste it into Figmento:</p>
      <div class="code-box" id="activation-code"></div>
      <button class="btn" id="copy-btn" onclick="copyCode()">Copy Activation Code</button>
      <p class="status" id="copy-status"></p>
      <ol class="steps">
        <li>Copy the code above</li>
        <li>Go back to Figma</li>
        <li>Paste it in the "Activation Code" field</li>
        <li>You're connected!</li>
      </ol>
    </div>

    <div id="error-section" style="display:none;">
      <p class="error" id="error-msg"></p>
      <p class="status">Close this tab and try again from Figmento.</p>
    </div>
  </div>

  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state');
      const errorParam = params.get('error');

      if (errorParam) {
        showError('Authorization denied: ' + (params.get('error_description') || errorParam));
        return;
      }

      if (!code) {
        showError('No authorization code received.');
        return;
      }

      try {
        // Exchange code for token
        // The code_verifier was stored by the plugin before opening this page.
        // Since the plugin can't send it here (cross-origin), the callback page
        // needs to receive it. We use a URL hash fragment (never sent to server).
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const codeVerifier = hashParams.get('verifier');

        if (!codeVerifier) {
          // Fallback: display the authorization code itself as the activation code.
          // The plugin will handle the token exchange using its stored verifier.
          const activationData = btoa(JSON.stringify({
            authorization_code: code,
            state: state,
          }));
          document.getElementById('activation-code').textContent = activationData;
          document.getElementById('loading').style.display = 'none';
          document.getElementById('success').style.display = 'block';
          return;
        }

        const resp = await fetch('https://auth.openai.com/oauth/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grant_type: 'authorization_code',
            code: code,
            code_verifier: codeVerifier,
            client_id: 'app_EMoamEEZ73f0CkXaXp7hrann',
            redirect_uri: window.location.origin + window.location.pathname,
          }),
        });

        if (!resp.ok) {
          const errText = await resp.text();
          showError('Token exchange failed: ' + errText);
          return;
        }

        const data = await resp.json();
        const tokenPayload = {
          access_token: data.access_token,
          refresh_token: data.refresh_token || undefined,
          expires_at: Date.now() + (data.expires_in || 3600) * 1000,
          scope: data.scope || '',
          account_id: data.account_id || undefined,
        };

        const activationCode = btoa(JSON.stringify(tokenPayload));
        document.getElementById('activation-code').textContent = activationCode;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('success').style.display = 'block';
      } catch (err) {
        showError('Error: ' + (err.message || String(err)));
      }
    })();

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-section').style.display = 'block';
    }

    function copyCode() {
      const code = document.getElementById('activation-code').textContent;
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        document.getElementById('copy-status').textContent = 'Now paste this in Figmento.';
        setTimeout(() => {
          btn.textContent = 'Copy Activation Code';
          btn.classList.remove('copied');
        }, 3000);
      });
    }
  </script>
</body>
</html>
